name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'docs/**'
      - 'mkdocs*.yml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git-revision-date-localized

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.pythonLocation }}/lib/python3.11/site-packages
          key: ${{ runner.os }}-mkdocs-${{ hashFiles('mkdocs.yml', 'mkdocs.zh.yml') }}
          restore-keys: |
            ${{ runner.os }}-mkdocs-

      - name: Install MkDocs dependencies
        run: |
          pip install --upgrade pip
          pip install \
            mkdocs-material \
            mkdocs-static-i18n \
            mkdocs-git-revision-date-localized-plugin \
            mkdocs-minify-plugin \
            pymdown-extensions

      - name: Prepare shared assets
        run: mkdir -p _site

      - name: Build English site
        run: |
          mkdocs build --config-file mkdocs.yml
          echo "English site built to _site/en/"

      - name: Build Chinese site
        run: |
          mkdocs build --config-file mkdocs.zh.yml
          echo "Chinese site built to _site/zh/"

      - name: Copy landing page
        run: |
          # Copy the new landing pages to root (these will be the entry points)
          # MkDocs builds docs to _site/en/ and _site/zh/ subdirs
          cp docs/landing/index.html _site/index.html
          
          # Create a separate home dir for Chinese landing page
          # to avoid conflict with MkDocs zh/index.html
          mkdir -p _site/home
          cp docs/landing/zh.html _site/home/index.html
          
          # Create a simple redirect from root /zh to /home for Chinese landing
          cat > _site/zh-landing.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><meta http-equiv="refresh" content="0; url=home/"></head>
          <body><p>Redirecting to <a href="home/">Chinese Home</a>...</p></body>
          </html>
          EOF
          
          echo "Landing pages copied to _site/"
          ls -la _site/ | head -15

      - name: Validate site
        run: |
          echo "Checking generated files..."
          find _site/ -name "*.html" | head -20
          echo "Total HTML files: $(find _site/ -name '*.html' | wc -l)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
