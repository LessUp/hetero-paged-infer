name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'docs/**'
      - 'mkdocs*.yml'
      - 'index.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git-revision-date-localized

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.pythonLocation }}/lib/python3.11/site-packages
          key: ${{ runner.os }}-mkdocs-${{ hashFiles('mkdocs.yml', 'mkdocs.zh.yml') }}
          restore-keys: |
            ${{ runner.os }}-mkdocs-

      - name: Install MkDocs dependencies
        run: |
          pip install --upgrade pip
          pip install \
            mkdocs-material \
            mkdocs-static-i18n \
            mkdocs-git-revision-date-localized-plugin \
            mkdocs-minify-plugin \
            pymdown-extensions

      - name: Prepare shared assets
        run: mkdir -p _site

      - name: Build English site
        run: |
          mkdocs build --config-file mkdocs.yml --strict
          echo "English site built to _site/en/"

      - name: Build Chinese site
        run: |
          mkdocs build --config-file mkdocs.zh.yml --strict
          echo "Chinese site built to _site/zh/"

      - name: Copy landing page
        run: |
          cp index.md _site/
          cp README.md _site/ 2>/dev/null || true
          cp README.zh.md _site/ 2>/dev/null || true

      - name: Validate site
        run: |
          echo "Checking generated files..."
          find _site/ -name "*.html" | head -20
          echo "Total HTML files: $(find _site/ -name '*.html' | wc -l)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
