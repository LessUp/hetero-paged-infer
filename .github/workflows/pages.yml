name: 部署到 GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - '*.md'
      - 'docs/**'
      - 'changelog/**'
      - '_config.yml'
      - 'index.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: 构建 Jekyll 站点
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            *.md
            _config.yml
            docs
            changelog
            LICENSE

      - name: 设置 Pages
        uses: actions/configure-pages@v5

      - name: 使用 Jekyll 构建
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: 上传构件
        uses: actions/upload-pages-artifact@v3

  deploy:
    name: 部署到 GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 成功后通知
  notify:
    name: 部署通知
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: success()
    steps:
      - name: 部署成功
        run: |
          echo "✅ GitHub Pages 部署成功"
          echo "📍 URL: https://lessup.github.io/hetero-paged-infer/"
