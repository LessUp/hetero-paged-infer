name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - 'docs/**'
      - 'mkdocs*.yml'
      - '.github/workflows/pages.yml'
      - 'index.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mkdocs-material
          pip install mkdocs-static-i18n
          pip install mkdocs-git-revision-date-localized-plugin
          pip install mkdocs-minify-plugin
          pip install pymdown-extensions

      - name: Create site directory
        run: mkdir -p _site

      - name: Copy root index
        run: |
          cp index.md _site/
          cp README.md _site/ 2>/dev/null || true
          cp README.zh.md _site/ 2>/dev/null || true

      - name: Build English site
        run: |
          mkdocs build --config-file mkdocs.yml --site-dir _site/en

      - name: Build Chinese site  
        run: |
          mkdocs build --config-file mkdocs.zh.yml --site-dir _site/zh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment Summary
        run: |
          echo "✅ MkDocs site deployed successfully!"
          echo "🌐 Site URL: https://lessup.github.io/hetero-paged-infer/"
          echo "📚 English Docs: https://lessup.github.io/hetero-paged-infer/en/"
          echo "📚 中文文档: https://lessup.github.io/hetero-paged-infer/zh/"
