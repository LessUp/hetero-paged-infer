# Hetero-Paged-Infer 文档 (中文)
# 由 MkDocs Material + i18n 插件构建

site_name: Hetero-Paged-Infer 异构推理系统
site_description: 面向大语言模型的高性能异构推理引擎
site_url: https://lessup.github.io/hetero-paged-infer/zh/
site_author: LessUp

docs_dir: docs/zh
site_dir: _site/zh

repo_url: https://github.com/LessUp/hetero-paged-infer
repo_name: LessUp/hetero-paged-infer
edit_uri: edit/master/docs/zh/

theme:
  name: material
  language: zh
  logo: ../assets/images/logo.svg
  favicon: ../assets/images/favicon.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: indigo
      accent: pink
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: pink
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

extra_css:
  - ../../assets/stylesheets/extra.css

extra_javascript:
  - ../../assets/javascripts/mathjax.js
  - ../../assets/javascripts/extra.js

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_numbers: true
      use_pygments: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

plugins:
  - search:
      lang: zh
      separator: '[\s\u200b\-,:!=\[\]()"/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

  - i18n:
      languages:
        - locale: en
          name: English
          site_name: Hetero-Paged-Infer
        - locale: zh
          name: 中文
          default: true
          site_name: Hetero-Paged-Infer 异构推理系统

  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true
      locale: zh

  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/LessUp/hetero-paged-infer
      name: LessUp on GitHub
    - icon: fontawesome/brands/rust
      link: https://crates.io/crates/hetero-paged-infer
      name: Crates.io
  generator: false
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY

copyright: |
  Copyright &copy; 2026 LessUp – <a href="#__consent">更改 Cookie 设置</a>

nav:
  - 首页: index.md
  - 环境搭建:
      - 快速入门: setup/quickstart.md
      - 安装指南: setup/installation.md
      - 配置说明: setup/configuration.md
      - 高级配置: setup/advanced-config.md
  - 架构设计:
      - 系统概览: architecture/overview.md
      - 设计原则: architecture/design.md
  - API 参考:
      - 核心类型: api/core-types.md
      - 完整参考: api/reference.md
  - 部署运维:
      - Docker 部署: deployment/docker.md
      - 生产部署: deployment/production.md
  - 开发指南:
      - 贡献指南: development/contributing.md
  - 变更日志: changelog/index.md
