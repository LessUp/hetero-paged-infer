# Site Configuration
title: Hetero-Paged-Infer
description: >-
  Heterogeneous Inference System with PagedAttention and Continuous Batching
  for CPU-GPU Co-execution

# Author
author: LessUp
email: contact@example.com

# Theme
remote_theme: pages-themes/cayman@v0.2.0

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Repository
repository: LessUp/hetero-paged-infer

# URL Configuration
url: https://lessup.github.io
baseurl: /hetero-paged-infer

# Languages
languages:
  - en
  - zh

default_lang: en

# Display Settings
show_downloads: true
google_analytics: false

# Markdown Rendering
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Navigation - English
navigation_en:
  - title: Home
    url: /
  - title: README
    url: /README
  - title: Changelog
    url: /CHANGELOG
  - title: Contributing
    url: /CONTRIBUTING
  - title: English Docs
    url: /docs/en/
  - title: 中文文档
    url: /docs/zh/

# Navigation - Chinese
navigation_zh:
  - title: 首页
    url: /
  - title: 项目说明
    url: /README
  - title: 变更日志
    url: /CHANGELOG
  - title: 贡献指南
    url: /CONTRIBUTING
  - title: English Docs
    url: /docs/en/
  - title: 中文文档
    url: /docs/zh/

# Default Layout
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "docs"
    values:
      layout: default
  - scope:
      path: "changelog"
    values:
      layout: default
      category: changelog

# Exclude Files
exclude:
  - .git
  - .github
  - .kiro
  - .vscode
  - src
  - tests
  - target
  - Cargo.toml
  - Cargo.lock
  - rustfmt.toml
  - .editorconfig
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - vendor
  - "*.rs"
  - config.example.json
  - RELEASE_NOTES.md

# Include Files
include:
  - README.md
  - README.zh.md
  - CHANGELOG.md
  - CONTRIBUTING.md
  - index.md
  - docs

# Collections
collections:
  changelog:
    output: true
    permalink: /:collection/:name
  docs:
    output: true
    permalink: /:collection/:path

# Social Links
social:
  github: LessUp/hetero-paged-infer

# SEO
twitter:
  card: summary

# Timezone
timezone: Asia/Shanghai

# Pagination
paginate: 10
paginate_path: "/blog/page:num/"
