# GitHub Pages Configuration
# This file configures Jekyll for GitHub Pages deployment
# Note: The actual documentation is built with MkDocs

# Site settings
title: Hetero-Paged-Infer
description: >-
  High-Performance Heterogeneous Inference Engine for LLMs
  with PagedAttention and Continuous Batching

# Author
author: LessUp

# Repository
repository: LessUp/hetero-paged-infer
url: https://lessup.github.io
baseurl: /hetero-paged-infer

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Theme (minimal, since we use MkDocs)
theme: minima

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude files not needed for Pages
exclude:
  - .git
  - .github
  - .kiro
  - .vscode
  - src
  - tests
  - target
  - Cargo.toml
  - Cargo.lock
  - rustfmt.toml
  - .editorconfig
  - .gitignore
  - config.example.json
  - "*.rs"
  - mkdocs*.yml
  - requirements*.txt
  - site/
  - venv/
  - ".python-version"

# Include specific files  
include:
  - index.md
  - README.md
  - README.zh.md
  - CHANGELOG.md
  - CONTRIBUTING.md
  - docs

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Social links
social:
  github: LessUp

# SEO
twitter:
  card: summary

# Language settings
lang: en

# Timezone
timezone: Asia/Shanghai
