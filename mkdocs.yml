# Hetero-Paged-Infer Documentation (English)
# Built by MkDocs Material + i18n plugin

site_name: Hetero-Paged-Infer
site_description: High-performance heterogeneous inference engine for Large Language Models
site_url: https://lessup.github.io/hetero-paged-infer/en/
site_author: LessUp

docs_dir: docs/en
site_dir: _site/en

repo_url: https://github.com/LessUp/hetero-paged-infer
repo_name: LessUp/hetero-paged-infer
edit_uri: edit/master/docs/en/

theme:
  name: material
  language: en
  logo: ../assets/images/logo.svg
  favicon: ../assets/images/favicon.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: indigo
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: indigo
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

extra_css:
  - ../../assets/stylesheets/extra.css

extra_javascript:
  - ../../assets/javascripts/mathjax.js
  - ../../assets/javascripts/extra.js

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

  - i18n:
      languages:
        - locale: en
          name: English
          default: true
        - locale: zh
          name: 中文
          site_name: Hetero-Paged-Infer 异构推理系统

  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true

  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/LessUp/hetero-paged-infer
      name: LessUp on GitHub
    - icon: fontawesome/brands/rust
      link: https://crates.io/crates/hetero-paged-infer
      name: Crates.io
  generator: false
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY

copyright: |
  Copyright &copy; 2026 LessUp – <a href="#__consent">Change cookie settings</a>

nav:
  - Home: index.md
  - Setup:
      - Quick Start: setup/quickstart.md
      - Installation: setup/installation.md
      - Configuration: setup/configuration.md
      - Advanced Configuration: setup/advanced-config.md
  - Architecture:
      - Overview: architecture/overview.md
      - Design Principles: architecture/design.md
  - API Reference:
      - Core Types: api/core-types.md
      - Full Reference: api/reference.md
  - Deployment:
      - Docker Guide: deployment/docker.md
      - Production Deploy: deployment/production.md
  - Development:
      - Contributing: development/contributing.md
  - Changelog: changelog/index.md
