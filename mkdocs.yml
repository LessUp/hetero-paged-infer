# MkDocs Material Configuration - English
site_name: Hetero-Paged-Infer
site_description: High-Performance Heterogeneous Inference Engine for LLMs
site_author: LessUp
site_url: https://lessup.github.io/hetero-paged-infer/en/

docs_dir: docs/en
site_dir: _site/en

theme:
  name: material
  language: en
  
  # Advanced theming
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  
  font:
    text: Roboto
    code: JetBrains Mono
  
  icon:
    logo: material/memory
    repo: fontawesome/brands/github
  
  favicon: assets/favicon.png
  
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - announce.dismiss

plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

  - i18n:
      languages:
        - locale: en
          name: English
          default: true
        - locale: zh
          name: 中文
          site_name: Hetero-Paged-Infer 异构推理系统

  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true

  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
      toc_depth: 4
  
  # PyMdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/LessUp/hetero-paged-infer
      name: GitHub Repository
    - icon: fontawesome/solid/book
      link: https://github.com/LessUp/hetero-paged-infer/blob/main/README.zh.md
      name: 中文文档
  
  alternate:
    - name: English
      link: /en/
      lang: en
    - name: 中文
      link: /zh/
      lang: zh
  
  analytics:
    provider: google
    property: !ENV [GOOGLE_ANALYTICS_ID, ""]
  
  # Version information
  version:
    provider: mike
  
  # Language selector
  language_switcher: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/extra.js

# Page tree
nav:
  - Home: index.md
  - Setup:
    - Quick Start: setup/quickstart.md
    - Installation: setup/installation.md
    - Configuration: setup/configuration.md
  - Architecture:
    - Overview: architecture/overview.md
  - API Reference:
    - Core Types: api/core-types.md
  - Deployment:
    - Docker: deployment/docker.md
  - Development:
    - Contributing: development/contributing.md
  - Changelog: changelog/index.md

copyright: |
  Copyright &copy; 2026 LessUp – <a href="#__consent">Change cookie settings</a>
