<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Favicon: Hetero-Paged-Infer logo - layered inference icon -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3949ab;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a237e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="url(#grad)"/>
  <!-- Layered pages (representing PagedAttention) -->
  <rect x="6" y="6" width="10" height="10" rx="1" fill="#ffffff" opacity="0.9"/>
  <rect x="16" y="6" width="10" height="10" rx="1" fill="#ffffff" opacity="0.7"/>
  <rect x="6" y="16" width="10" height="10" rx="1" fill="#ffffff" opacity="0.7"/>
  <rect x="16" y="16" width="10" height="10" rx="1" fill="#ffffff" opacity="0.5"/>
  <!-- Connection lines (representing heterogeneous computing) -->
  <line x1="16" y1="11" x2="16" y2="11" stroke="#ff4081" stroke-width="2"/>
  <line x1="11" y1="16" x2="11" y2="16" stroke="#ff4081" stroke-width="2"/>
  <!-- GPU chip accent -->
  <rect x="22" y="22" width="6" height="6" rx="1" fill="#ff4081" opacity="0.8"/>
</svg>
