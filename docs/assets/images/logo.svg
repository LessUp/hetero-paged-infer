<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Logo: Hetero-Paged-Infer - Heterogeneous inference engine logo -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3949ab;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a237e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4081;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f50057;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Circular background -->
  <circle cx="60" cy="60" r="56" fill="url(#bg-grad)" filter="url(#shadow)"/>

  <!-- CPU block (top-left) -->
  <g transform="translate(18, 18)">
    <rect x="0" y="0" width="36" height="36" rx="4" fill="#ffffff" opacity="0.9"/>
    <!-- CPU pins -->
    <line x1="8" y1="-4" x2="8" y2="0" stroke="#ffffff" stroke-width="2"/>
    <line x1="18" y1="-4" x2="18" y2="0" stroke="#ffffff" stroke-width="2"/>
    <line x1="28" y1="-4" x2="28" y2="0" stroke="#ffffff" stroke-width="2"/>
    <line x1="8" y1="36" x2="8" y2="40" stroke="#ffffff" stroke-width="2"/>
    <line x1="18" y1="36" x2="18" y2="40" stroke="#ffffff" stroke-width="2"/>
    <line x1="28" y1="36" x2="28" y2="40" stroke="#ffffff" stroke-width="2"/>
    <!-- CPU label -->
    <rect x="10" y="12" width="16" height="3" rx="1" fill="#3949ab" opacity="0.6"/>
    <rect x="10" y="18" width="16" height="3" rx="1" fill="#3949ab" opacity="0.6"/>
    <rect x="10" y="24" width="10" height="3" rx="1" fill="#3949ab" opacity="0.6"/>
  </g>

  <!-- GPU block (bottom-right) -->
  <g transform="translate(66, 66)">
    <rect x="0" y="0" width="36" height="36" rx="4" fill="url(#accent-grad)"/>
    <!-- GPU memory blocks -->
    <rect x="6" y="6" width="8" height="8" rx="1" fill="#ffffff" opacity="0.3"/>
    <rect x="16" y="6" width="8" height="8" rx="1" fill="#ffffff" opacity="0.3"/>
    <rect x="6" y="16" width="8" height="8" rx="1" fill="#ffffff" opacity="0.3"/>
    <rect x="16" y="16" width="8" height="8" rx="1" fill="#ffffff" opacity="0.3"/>
    <!-- GPU label -->
    <rect x="10" y="27" width="16" height="3" rx="1" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- PagedAttention pages (middle area) -->
  <g transform="translate(42, 42)">
    <rect x="0" y="0" width="16" height="16" rx="2" fill="#ffffff" opacity="0.8"/>
    <rect x="20" y="0" width="16" height="16" rx="2" fill="#ffffff" opacity="0.6"/>
    <rect x="0" y="20" width="16" height="16" rx="2" fill="#ffffff" opacity="0.6"/>
    <rect x="20" y="20" width="16" height="16" rx="2" fill="#ffffff" opacity="0.4"/>
    <!-- Page table connections -->
    <line x1="16" y1="8" x2="20" y2="8" stroke="#ff4081" stroke-width="2"/>
    <line x1="8" y1="16" x2="8" y2="20" stroke="#ff4081" stroke-width="2"/>
  </g>

  <!-- Data flow arrows -->
  <polygon points="56,54 60,50 64,54 60,52" fill="#ff4081" opacity="0.8"/>
  <polygon points="56,68 60,72 64,68 60,70" fill="#ff4081" opacity="0.8"/>
  <polygon points="54,56 50,60 54,64 52,60" fill="#ff4081" opacity="0.8"/>
  <polygon points="68,56 72,60 68,64 70,60" fill="#ff4081" opacity="0.8"/>
</svg>
